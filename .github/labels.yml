labels:
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: "duplicate"
    color: "cfd3d7"
    description: "This issue or pull request already exists"
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed"
  - name: "invalid"
    color: "e4e669"
    description: "This doesn't seem right"
  - name: "question"
    color: "d876e3"
    description: "Further information is requested"
  - name: "wontfix"
    color: "ffffff"
    description: "This will not be worked on"
  - name: "investigation needed"
    color: "14b8f3"
    description: "We would need to investigate."
  - name: "solved"
    color: "0e8a16"
    description: "Issues that we believe we already solved in a new release"
  - name: "temporary solution proposed"
    color: "1d76db"
    description: "Temporary solution proposed"
  - name: "do not merge"
    color: "b60205"
    description: "Do not merge the changes"
  - name: "no action items"
    color: "5319e7"
    description: "No immediate action items to be done"
  - name: "fix"
    color: "fbca04"
    description: "Bug fix or small change"
  - name: "feature"
    color: "0e8a16"
    description: "New feature or request"
  - name: "docs"
    color: "0075ca"
    description: "Documentation changes or additions"
  - name: "maintenance"
    color: "6f42c1"
    description: "Maintenance tasks, refactors, or housekeeping"
  - name: "dependencies"
    color: "0d9488"
    description: "Dependency updates or related changes"
  - name: "security"
    color: "b60205"
    description: "Security-related issues or updates"
  - name: "breaking"
    color: "000000"
    description: "Breaking change that requires attention during upgrade"
  - name: "skip-changelog"
    color: "cfd3d7"
    description: "Do not include this PR in changelog or release notes"
